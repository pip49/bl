
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블루스 레전드</title>
    <style>
        /* 기본 배경 및 폰트 설정 */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        /* 상단 이미지 섹션 */
        header {
            margin-top: 50px;
            text-align: center;
        }

        .profile-img {
            max-width: 300px;
            height: auto;
            border-radius: 10px;
            filter: drop-shadow(0 0 15px rgba(255, 165, 0, 0.3));
            cursor: pointer; /* 클릭 가능하다는 표시 */
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05); /* 마우스 올리면 살짝 커짐 */
            filter: drop-shadow(0 0 20px rgba(255, 165, 0, 0.5));
        }

        h1 {
            font-size: 2.5rem;
            margin-top: 20px;
            color: #ffb400;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 중앙 메인 콘텐츠 영역 */
        main {
            flex: 1;
            width: 100%;
            max-width: 800px;
            position: relative;
            padding: 20px;
        }

        /* 우측 하단 세로 링크 메뉴 */
        .side-menu {
            position: absolute;
            bottom: 50px;
            right: 20px;
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .side-menu a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.3s ease;
            border-bottom: 1px solid transparent;
        }

        .side-menu a:hover {
            color: #ffb400;
            border-bottom: 1px solid #ffb400;
        }

        /* 미디어 모달 (팝업) 스타일 */
        .modal {
            display: none; /* 기본적으로 숨김 */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9); /* 배경을 어둡게 */
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 500px; /* 오디오 플레이어에 맞춰 가로폭 조정 */
        }

        /* 오디오 플레이어 스타일 */
        audio {
            width: 100%;
            outline: none;
        }

        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 푸터 설정 */
        footer {
            width: 100%;
            padding: 30px 0;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
            border-top: 1px solid #333;
        }

        @media (max-width: 600px) {
            .side-menu {
                position: static;
                margin-top: 50px;
                text-align: center;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="나2.png" alt="블루스 아티스트" class="profile-img" onclick="openModal()">
        <h1>블루스 레전드</h1>
        <p style="color: #666; font-size: 0.9rem;">이미지를 클릭하여 연주를 감상해보세요</p>
    </header>

    <main>
        <div class="side-menu">
            <a href="#location">장소</a>
            <a href="#time">시간</a>
            <a href="#performer">출연자</a>
        </div>
    </main>

    <div id="mediaModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">&times;</span>

            <audio id="myAudio" controls>
                <source src="5.mp3" type="audio/mpeg">
                브라우저가 오디오 태그를 지원하지 않습니다.
            </audio>

            </div>
    </div>

    <footer>
        <p>Contact: your-email@example.com</p>
        <p>&copy; 2026 Blues Legend. All rights reserved.</p>
    </footer>

    <script>
        const modal = document.getElementById("mediaModal");
        const audio = document.getElementById("myAudio");

        function openModal() {
            modal.style.display = "flex";
            audio.play(); // 열릴 때 자동 재생
        }

        function closeModal() {
            modal.style.display = "none";
            audio.pause(); // 닫을 때 일시정지
            audio.currentTime = 0; // 재생 위치 초기화
        }

        // ESC 키 누르면 닫기
        window.onkeydown = function(event) {
            if (event.keyCode == 27) {
                closeModal();
            }
        };
    </script>

</body>
</html>
